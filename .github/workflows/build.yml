name: Build Android & iOS

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:   # allow manual trigger from GitHub UI

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # ANDROID — produces a signed release APK
  # ─────────────────────────────────────────────────────────────────────────────
  android:
    name: Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin

      - name: Install npm dependencies
        run: npm ci

      - name: Build web app
        run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}

      - name: Sync Capacitor → Android
        run: npx cap sync android

      - name: Point Gradle to Android SDK
        run: echo "sdk.dir=$ANDROID_HOME" > android/local.properties

      - name: Make Gradle wrapper executable
        run: chmod +x android/gradlew

      # ── Debug APK (no signing required, available immediately) ────────────
      - name: Build debug APK
        run: cd android && ./gradlew assembleDebug --no-daemon

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: skyfit-debug-${{ github.run_number }}.apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      # ── Release APK (signed — needs keystore secrets, see README) ─────────
      - name: Decode keystore
        if: ${{ secrets.KEYSTORE_BASE64 != '' }}
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > android/app/release.keystore

      - name: Build release APK
        if: ${{ secrets.KEYSTORE_BASE64 != '' }}
        run: cd android && ./gradlew assembleRelease --no-daemon
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS:         ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD:      ${{ secrets.KEY_PASSWORD }}

      - name: Upload release APK
        if: ${{ secrets.KEYSTORE_BASE64 != '' }}
        uses: actions/upload-artifact@v4
        with:
          name: skyfit-release-${{ github.run_number }}.apk
          path: android/app/build/outputs/apk/release/app-release.apk
          retention-days: 90

  # ─────────────────────────────────────────────────────────────────────────────
  # iOS — unsigned .app build (simulator) — no Apple account needed
  #       For TestFlight/App Store, add Apple certs to secrets (see README)
  # ─────────────────────────────────────────────────────────────────────────────
  ios:
    name: iOS Build
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install npm dependencies
        run: npm ci

      - name: Build web app
        run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}

      - name: Sync Capacitor → iOS
        run: npx cap sync ios

      - name: Resolve Swift Package dependencies
        run: |
          cd ios/App
          xcodebuild -resolvePackageDependencies \
            -workspace App.xcworkspace \
            -scheme App \
            -clonedSourcePackagesDirPath SourcePackages

      # ── Unsigned simulator build (works without Apple Developer account) ──
      - name: Build for iOS Simulator
        run: |
          cd ios/App
          xcodebuild build \
            -workspace App.xcworkspace \
            -scheme App \
            -configuration Debug \
            -sdk iphonesimulator \
            -destination 'generic/platform=iOS Simulator' \
            -clonedSourcePackagesDirPath SourcePackages \
            CODE_SIGNING_ALLOWED=NO \
            ONLY_ACTIVE_ARCH=NO \
            | xcpretty || true

      # ── Signed IPA for TestFlight (needs Apple certs in secrets) ──────────
      - name: Import Apple certificate
        if: ${{ secrets.APPLE_CERTIFICATE_BASE64 != '' }}
        run: |
          echo "${{ secrets.APPLE_CERTIFICATE_BASE64 }}" | base64 -d > certificate.p12
          security create-keychain -p "" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "" build.keychain
          security import certificate.p12 -k build.keychain \
            -P "${{ secrets.APPLE_CERTIFICATE_PASSWORD }}" \
            -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple: -s \
            -k "" build.keychain

      - name: Install provisioning profile
        if: ${{ secrets.APPLE_PROVISIONING_PROFILE_BASE64 != '' }}
        run: |
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          echo "${{ secrets.APPLE_PROVISIONING_PROFILE_BASE64 }}" | base64 -d \
            > ~/Library/MobileDevice/Provisioning\ Profiles/skyfit.mobileprovision

      - name: Build signed IPA
        if: ${{ secrets.APPLE_CERTIFICATE_BASE64 != '' }}
        run: |
          cd ios/App
          xcodebuild archive \
            -workspace App.xcworkspace \
            -scheme App \
            -configuration Release \
            -archivePath SkyFit.xcarchive \
            -clonedSourcePackagesDirPath SourcePackages \
            CODE_SIGN_STYLE=Manual \
            PROVISIONING_PROFILE_SPECIFIER="${{ secrets.APPLE_PROVISIONING_PROFILE_NAME }}" \
            | xcpretty || true
          xcodebuild -exportArchive \
            -archivePath SkyFit.xcarchive \
            -exportOptionsPlist ExportOptions.plist \
            -exportPath SkyFit.ipa

      - name: Upload IPA
        if: ${{ secrets.APPLE_CERTIFICATE_BASE64 != '' }}
        uses: actions/upload-artifact@v4
        with:
          name: skyfit-${{ github.run_number }}.ipa
          path: ios/App/SkyFit.ipa/
          retention-days: 90
